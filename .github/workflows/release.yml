name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p reap

      - name: Package
        shell: bash
        run: |
          name="reap-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "$name.zip" "./target/${{ matrix.target }}/release/reap.exe"
            echo "ASSET=$name.zip" >> "$GITHUB_ENV"
          else
            tar -C "target/${{ matrix.target }}/release" -czf "$name.tar.gz" reap
            echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
